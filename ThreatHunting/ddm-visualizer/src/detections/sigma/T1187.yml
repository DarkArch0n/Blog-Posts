title: Forced Authentication - NTLM Coercion via PetitPotam, PrinterBug, or UNC Files
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d67
status: experimental
description: |
  Detects forced NTLM authentication via PetitPotam (MS-EFSRPC), PrinterBug (SpoolSample),
  DFSCoerce, malicious .scf/.url/.lnk files with UNC paths, and other NTLM coercion tools
  that force target systems to authenticate to attacker-controlled servers.
references:
  - https://attack.mitre.org/techniques/T1187/
  - https://github.com/topotam/PetitPotam
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1187
logsource:
  product: windows
  category: process_creation
detection:
  selection_coercion_tools:
    CommandLine|contains:
      - 'PetitPotam'
      - 'SpoolSample'
      - 'PrinterBug'
      - 'DFSCoerce'
      - 'Coercer'
      - 'ShadowCoerce'
  selection_ntlmrelay:
    CommandLine|contains:
      - 'ntlmrelayx'
      - 'impacket-ntlmrelayx'
      - 'MultiRelay'
  selection_scf_creation:
    TargetFilename|endswith:
      - '.scf'
      - '.url'
      - '.searchConnector-ms'
    TargetFilename|contains: '\\'
  condition: selection_coercion_tools or selection_ntlmrelay or selection_scf_creation
falsepositives:
  - Authorized penetration testing
level: critical
