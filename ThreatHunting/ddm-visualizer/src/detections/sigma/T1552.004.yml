title: Private Key Theft - SSH and TLS Key File Access
id: e3f4a5b6-c7d8-4e9f-0a1b-2c3d4e5f6a78
status: experimental
description: |
  Detects private key theft by monitoring for non-standard processes accessing SSH keys
  (~/.ssh/id_*), TLS certificates (/etc/ssl/private/), Windows certificate export via
  certutil, and DPAPI-protected certificate extraction.
references:
  - https://attack.mitre.org/techniques/T1552/004/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1552.004
logsource:
  category: process_creation
detection:
  selection_ssh_key_copy:
    CommandLine|contains:
      - '.ssh/id_'
      - '.ssh\id_'
      - 'id_rsa'
      - 'id_ed25519'
      - 'id_ecdsa'
  selection_certutil_export:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-exportPFX'
      - '-backup'
      - '-p'
  selection_openssl_key:
    CommandLine|contains:
      - 'openssl'
      - '.pem'
      - '.key'
      - '.pfx'
      - '.p12'
  selection_sharpdpapi:
    CommandLine|contains:
      - 'SharpDPAPI'
      - 'certificates'
  condition: selection_ssh_key_copy or selection_certutil_export or selection_openssl_key or selection_sharpdpapi
falsepositives:
  - Legitimate certificate management
  - SSH key distribution scripts
level: high
