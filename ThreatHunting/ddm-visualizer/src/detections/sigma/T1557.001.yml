title: LLMNR/NBT-NS Poisoning and SMB Relay via Responder
id: e1c2d3f4-a5b6-4c7d-8e9f-0a1b2c3d4e5f
status: experimental
description: |
  Detects LLMNR/NBT-NS poisoning and NTLM relay attacks. Monitors for Responder,
  Inveigh, ntlmrelayx, and mitm6 process execution, as well as suspicious LLMNR/NBT-NS
  response patterns from non-authorized systems.
references:
  - https://attack.mitre.org/techniques/T1557/001/
  - https://github.com/SpiderLabs/Responder
  - https://github.com/Kevin-Robertson/Inveigh
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1557.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_responder:
    CommandLine|contains:
      - 'Responder.py'
      - 'Responder.exe'
      - 'Inveigh'
      - 'ntlmrelayx'
      - 'mitm6'
      - 'PetitPotam'
  selection_listen_ports:
    CommandLine|contains:
      - '-I eth'
      - '-i eth'
      - 'SMB2Support'
  condition: selection_responder or selection_listen_ports
falsepositives:
  - Authorized penetration testing tools
level: critical
