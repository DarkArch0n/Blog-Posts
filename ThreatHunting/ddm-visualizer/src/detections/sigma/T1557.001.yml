title: LLMNR/NBT-NS Poisoning - Network Detection via DNS Event
id: e1c2d3f4-a5b6-4c7d-8e9f-0a1b2c3d4e60
status: experimental
description: |
  Detects LLMNR (UDP 5355) and NBT-NS (UDP 137) response anomalies indicating
  poisoning/relay attacks. Monitors for Windows Event 4697, Sysmon network events,
  and abnormal multicast DNS responses.
references:
  - https://attack.mitre.org/techniques/T1557/001/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1557.001
logsource:
  product: windows
  category: network_connection
detection:
  selection_llmnr_response:
    DestinationPort:
      - 5355
      - 137
    Initiated: 'true'
  filter_system_processes:
    Image|endswith:
      - '\svchost.exe'
      - '\dns.exe'
  condition: selection_llmnr_response and not filter_system_processes
falsepositives:
  - Legitimate LLMNR/NBT-NS services
level: high
