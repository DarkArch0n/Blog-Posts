title: Bash History Credential Access - Shell History File Reading
id: d2e3f4a5-b6c7-4d8e-9f0a-1b2c3d4e5f67
status: experimental
description: |
  Detects reading of shell history files for credential harvesting. Monitors for
  access to .bash_history, .zsh_history, .mysql_history, .psql_history, and
  grep searches within history files for passwords and secrets.
references:
  - https://attack.mitre.org/techniques/T1552/003/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1552.003
logsource:
  product: linux
  category: process_creation
detection:
  selection_history_read:
    CommandLine|contains:
      - '.bash_history'
      - '.zsh_history'
      - '.sh_history'
      - '.mysql_history'
      - '.psql_history'
      - '.histfile'
    Image|endswith:
      - '/cat'
      - '/less'
      - '/more'
      - '/grep'
      - '/head'
      - '/strings'
  selection_history_grep:
    CommandLine|contains|all:
      - 'history'
      - 'password'
  condition: selection_history_read or selection_history_grep
falsepositives:
  - Users reviewing their own command history
  - Forensic analysis
level: medium
