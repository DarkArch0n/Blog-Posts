title: Proc Filesystem Credential Access on Linux
id: c9a0e2b4-f5b6-4db6-a793-0ce48laa3d52
status: experimental
description: |
  Detects credential access via /proc/*/maps and /proc/*/mem on Linux systems to extract
  credentials from running processes. Covers manual /proc reads, MimiPenguin, and
  tools targeting sshd, Apache, gnome-keyring process memory.
references:
  - https://attack.mitre.org/techniques/T1003/007/
  - https://github.com/huntergregal/mimipenguin
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1003.007
logsource:
  product: linux
  category: process_creation
detection:
  selection_proc_mem:
    CommandLine|contains:
      - '/proc/'
      - 'mem'
    CommandLine|contains:
      - 'sshd'
      - 'apache'
      - 'gnome-keyring'
      - 'maps'
  selection_mimipenguin:
    CommandLine|contains:
      - 'mimipenguin'
      - 'LaZagne'
  selection_gcore:
    Image|endswith: '/gcore'
  selection_gdb_attach:
    Image|endswith: '/gdb'
    CommandLine|contains: 'attach'
  condition: selection_proc_mem or selection_mimipenguin or selection_gcore or selection_gdb_attach
falsepositives:
  - Legitimate debugging and diagnostics
  - Performance monitoring tools
level: high
