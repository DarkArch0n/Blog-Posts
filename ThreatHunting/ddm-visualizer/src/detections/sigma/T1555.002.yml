title: Securityd Memory Access - macOS Keychain Memory Extraction
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: experimental
description: |
  Detects attempts to read securityd process memory on macOS for credential extraction.
  Covers gdb/lldb attach to securityd, vmmap enumeration, and memory dump tools
  targeting the keychain daemon process.
references:
  - https://attack.mitre.org/techniques/T1555/002/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1555.002
logsource:
  product: macos
  category: process_creation
detection:
  selection_debug_securityd:
    CommandLine|contains:
      - 'securityd'
    Image|endswith:
      - '/gdb'
      - '/lldb'
  selection_vmmap:
    Image|endswith: '/vmmap'
    CommandLine|contains: 'securityd'
  selection_memory_dump:
    CommandLine|contains|all:
      - 'securityd'
      - 'mem'
  condition: selection_debug_securityd or selection_vmmap or selection_memory_dump
falsepositives:
  - Apple diagnostic tools
  - Legitimate security research
level: critical
