title: Browser Credential Extraction - Password Store and Cookie Database Access
id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: |
  Detects browser credential extraction by monitoring for non-browser processes accessing
  Chrome Login Data, Firefox logins.json, Edge Login Data, or browser cookie databases.
  Covers SharpChromium, HackBrowserData, LaZagne, and manual SQLite reads.
references:
  - https://attack.mitre.org/techniques/T1555/003/
  - https://github.com/AlessandroZ/LaZagne
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1555.003
logsource:
  product: windows
  category: file_access
detection:
  selection_chrome_login_data:
    TargetFilename|contains:
      - '\Google\Chrome\User Data\Default\Login Data'
      - '\Google\Chrome\User Data\Default\Network\Cookies'
      - '\Microsoft\Edge\User Data\Default\Login Data'
  selection_firefox_logins:
    TargetFilename|contains:
      - '\Mozilla\Firefox\Profiles\'
    TargetFilename|endswith:
      - 'logins.json'
      - 'key4.db'
      - 'cert9.db'
  selection_tools:
    CommandLine|contains:
      - 'SharpChromium'
      - 'HackBrowserData'
      - 'LaZagne'
      - 'BrowserGather'
      - 'WebBrowserPassView'
  filter_browsers:
    Image|endswith:
      - '\chrome.exe'
      - '\msedge.exe'
      - '\firefox.exe'
      - '\brave.exe'
  condition: (selection_chrome_login_data or selection_firefox_logins or selection_tools) and not filter_browsers
falsepositives:
  - Browser sync utilities
  - Password manager import tools
level: high
