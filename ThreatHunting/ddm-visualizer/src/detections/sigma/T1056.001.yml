title: Keylogging - Suspicious Input Capture via SetWindowsHookEx or GetAsyncKeyState
id: a7b8c9d0-e1f2-4a3b-4c5d-6e7f8a9b0c1d
status: experimental
description: |
  Detects keylogging activity by monitoring for processes using SetWindowsHookEx with
  keyboard hooks (WH_KEYBOARD_LL), GetAsyncKeyState polling, or known keylogger tools.
  Covers software keyloggers, PowerShell-based keyloggers, and credential capture scripts.
references:
  - https://attack.mitre.org/techniques/T1056/001/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.collection
  - attack.t1056.001
logsource:
  product: windows
  category: process_creation
detection:
  selection_keylogger_tools:
    CommandLine|contains:
      - 'Get-Keystrokes'
      - 'Start-KeyLogger'
      - 'KeyLogger'
      - 'GetAsyncKeyState'
      - 'SetWindowsHookEx'
  selection_powershell_keylog:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'GetAsyncKeyState'
      - 'user32.dll'
      - 'WH_KEYBOARD'
  condition: selection_keylogger_tools or selection_powershell_keylog
falsepositives:
  - Accessibility software
  - Legitimate input monitoring tools
level: high
