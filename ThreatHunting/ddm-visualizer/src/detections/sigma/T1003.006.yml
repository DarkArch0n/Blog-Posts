title: DCSync Attack - Directory Replication Service Access
id: b8f9d1a3-e4a5-4ca5-f682-9bd37kff2c41
status: experimental
description: |
  Detects DCSync attacks by monitoring Event 4662 for DS-Replication-Get-Changes and
  DS-Replication-Get-Changes-All access rights from non-DC sources. Covers Mimikatz
  lsadump::dcsync, Impacket secretsdump, and any tool using DRS GetNCChanges.
references:
  - https://attack.mitre.org/techniques/T1003/006/
  - https://adsecurity.org/?p=1729
  - https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/dump-password-hashes-from-domain-controller-with-dcsync
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1003.006
logsource:
  product: windows
  service: security
detection:
  selection_dcsync:
    EventID: 4662
    AccessMask: '0x100'
    Properties|contains:
      - '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2'
      - '1131f6ad-9c07-11d1-f79f-00c04fc2dcd2'
      - '89e95b76-444d-4c62-991a-0facbeda640c'
  filter_dc_accounts:
    SubjectUserName|endswith: '$'
    SubjectUserName|contains:
      - 'DC'
  condition: selection_dcsync and not filter_dc_accounts
falsepositives:
  - Legitimate domain controller replication
  - Azure AD Connect synchronization
level: critical
