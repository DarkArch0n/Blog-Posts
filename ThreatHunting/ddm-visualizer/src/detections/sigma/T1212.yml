title: Exploitation for Credential Access - Known CVE Exploit Execution
id: c3d4e5f6-a7b8-4c9d-0e1f-2a3b4c5d6e78
status: experimental
description: |
  Detects exploitation of known vulnerabilities for credential access including
  ZeroLogon (CVE-2020-1472), PrintNightmare (CVE-2021-34527), noPac/sAMAccountName
  (CVE-2021-42278/42287), and Certifried (CVE-2022-26923).
references:
  - https://attack.mitre.org/techniques/T1212/
  - https://www.secura.com/blog/zero-logon
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1212
logsource:
  product: windows
  category: process_creation
detection:
  selection_zerologon:
    CommandLine|contains:
      - 'zerologon'
      - 'CVE-2020-1472'
      - 'secretsdump'
      - 'SharpZeroLogon'
  selection_printnightmare:
    CommandLine|contains:
      - 'PrintNightmare'
      - 'CVE-2021-34527'
      - 'SharpPrinter'
  selection_nopac:
    CommandLine|contains:
      - 'noPac'
      - 'sam-the-admin'
      - 'CVE-2021-42278'
      - 'CVE-2021-42287'
  selection_certifried:
    CommandLine|contains:
      - 'Certipy'
      - 'certifried'
      - 'CVE-2022-26923'
  selection_dc_password_reset:
    EventID: 4742
    ServicePrincipalNames: '*'
  condition: selection_zerologon or selection_printnightmare or selection_nopac or selection_certifried or selection_dc_password_reset
falsepositives:
  - Authorized penetration testing
level: critical
