title: Credentials in Registry - Autologon and VNC Password Queries
id: c1d2e3f4-a5b6-4c7d-8e9f-0a1b2c3d4e56
status: experimental
description: |
  Detects registry queries for stored credentials including Windows Autologon passwords,
  VNC passwords, PuTTY proxy credentials, and automated registry credential scanning
  tools like Seatbelt.
references:
  - https://attack.mitre.org/techniques/T1552/002/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.t1552.002
logsource:
  product: windows
  category: process_creation
detection:
  selection_autologon:
    Image|endswith: '\reg.exe'
    CommandLine|contains|all:
      - 'query'
      - 'Winlogon'
  selection_vnc_reg:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'TightVNC'
      - 'RealVNC'
      - 'WinVNC'
  selection_putty_reg:
    Image|endswith: '\reg.exe'
    CommandLine|contains:
      - 'SimonTatham'
      - 'PuTTY'
    CommandLine|contains: 'query'
  selection_seatbelt:
    CommandLine|contains: 'Seatbelt'
  condition: selection_autologon or selection_vnc_reg or selection_putty_reg or selection_seatbelt
falsepositives:
  - System inventory scripts
  - Remote support tools
level: medium
