title: MFA Modification - Authentication Method Changes in Azure AD
id: d6e7f8a9-b0c1-4d2e-3f4a-5b6c7d8e9f01
status: experimental
description: |
  Detects MFA configuration modifications including disabling MFA, registering new
  authentication methods, modifying Conditional Access policies, and adding bypass
  phone numbers in Azure AD, Okta, or Duo.
references:
  - https://attack.mitre.org/techniques/T1556/006/
author: DDM Visualizer Project
date: 2026/04/08
tags:
  - attack.credential_access
  - attack.persistence
  - attack.t1556.006
logsource:
  product: azure
  service: auditlogs
detection:
  selection_mfa_disable:
    operationName|contains:
      - 'Disable Strong Authentication'
      - 'Delete MFA'
      - 'User registered security info'
      - 'Admin registered security info'
      - 'Update StsRefreshTokenValidFrom'
  selection_auth_method:
    operationName|contains:
      - 'User registered all required security info'
      - 'Authentication Method'
      - 'StrongAuthenticationPhoneAppDetail'
  condition: selection_mfa_disable or selection_auth_method
falsepositives:
  - Legitimate MFA enrollment and registration
  - IT helpdesk assisting users with MFA setup
level: high
